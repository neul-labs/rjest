name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+crt-static"

jobs:
  # Verify the tag matches the version in Cargo.toml
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: tag
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ github.ref_name }}
      - name: Extract version from Cargo.toml
        id: version
        run: |
          cargo_version=$(grep -m1 'version = "' Cargo.toml | sed 's/.*version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $cargo_version"
          echo "Tag version: ${{ steps.tag.outputs.version }}"
          if [ "$cargo_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Error: Tag version does not match Cargo.toml version"
            exit 1
          fi
          echo "version=$cargo_version" >> $GITHUB_OUTPUT

  # Publish to crates.io
  publish-cargo:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io
        uses: actions-rs/cargo@v1
        with:
          command: publish
          args: --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # Build and publish runtime to npm
  publish-npm-runtime:
    name: Publish rjest-runtime to npm
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ./crates/rjest-runtime
        run: npm ci
      - name: Publish to npm
        working-directory: ./crates/rjest-runtime
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build and publish rjest binary package to npm
  publish-npm-binary:
    name: Publish rjest binary package to npm
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries, release]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ./packages/rjest
        run: |
          npm install extract-zip tar
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: ./packages/rjest/prebuilds
          merge-multiple: true

      - name: Create SHASUMS file
        working-directory: ./packages/rjest/prebuilds
        run: |
          shasum -a 256 *.tar.gz *.zip > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Update package version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          sed -i "s/\"version\": \"0.1.0\"/\"version\": \"${VERSION}\"/" packages/rjest/package.json
          cat packages/rjest/package.json | grep version

      - name: Publish to npm
        working-directory: ./packages/rjest
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build multi-platform binaries
  build-binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ''
            os: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ''
            os: linux
          - target: x86_64-apple-darwin
            runner: macos-latest
            ext: ''
            os: macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: ''
            os: macos
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: '.exe'
            os: windows
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Prepare binary for upload
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/jest${{ matrix.ext }}" "artifacts/jest-${{ matrix.os }}-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: artifacts/
          retention-days: 7

  # Create GitHub release with installers
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -la artifacts/

      - name: Create archive for Linux x86_64
        run: |
          cd artifacts/binary-x86_64-unknown-linux-gnu
          tar -czf ../../artifacts/jest-linux-x86_64.tar.gz jest-linux-x86_64-unknown-linux-gnu
          shasum -a 256 ../../artifacts/jest-linux-x86_64.tar.gz

      - name: Create archive for Linux aarch64
        run: |
          cd artifacts/binary-aarch64-unknown-linux-gnu
          tar -czf ../../artifacts/jest-linux-aarch64.tar.gz jest-linux-aarch64-unknown-linux-gnu
          shasum -a 256 ../../artifacts/jest-linux-aarch64.tar.gz

      - name: Create archive for macOS x86_64
        run: |
          cd artifacts/binary-x86_64-apple-darwin
          tar -czf ../../artifacts/jest-macos-x86_64.tar.gz jest-macos-x86_64-apple-darwin
          shasum -a 256 ../../artifacts/jest-macos-x86_64.tar.gz

      - name: Create archive for macOS arm64
        run: |
          cd artifacts/binary-aarch64-apple-darwin
          tar -czf ../../artifacts/jest-macos-arm64.tar.gz jest-macos-aarch64-apple-darwin
          shasum -a 256 ../../artifacts/jest-macos-arm64.tar.gz

      - name: Create zip for Windows
        run: |
          cd artifacts/binary-x86_64-pc-windows-msvc
          zip -r ../../artifacts/jest-windows-x86_64.zip jest-windows-x86_64-pc-windows-msvc.exe
          shasum -a 256 ../../artifacts/jest-windows-x86_64.zip

      - name: Create Homebrew formula
        run: |
          cat > artifacts/jest.rb << 'EOF'
          class Jest < Formula
            desc "A fast Jest-compatible test runner written in Rust"
            homepage "https://github.com/dipankarsarkar/rjest"
            version ENV["VERSION"]
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/dipankarsarkar/rjest/releases/download/v#{version}/jest-macos-x86_64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_X86_64_SHA"]
                puts "Intel Mac detected, using x86_64 binary"
              else
                url "https://github.com/dipankarsarkar/rjest/releases/download/v#{version}/jest-macos-arm64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_ARM64_SHA"]
                puts "Apple Silicon detected, using arm64 binary"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/dipankarsarkar/rjest/releases/download/v#{version}/jest-linux-x86_64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_X86_64_SHA"]
                puts "Intel/AMD x86_64 detected, using x86_64 binary"
              else
                url "https://github.com/dipankarsarkar/rjest/releases/download/v#{version}/jest-linux-aarch64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_ARM64_SHA"]
                puts "ARM64 detected, using aarch64 binary"
              end
            end

            def install
              bin.install "jest-#{OS.kernel_name.downcase}-#{Hardware::CPU.arch}-unknown-linux-gnu"
            end

            test do
              system "#{bin}/jest --version"
            end
          end
          EOF

      - name: Create PyPI package metadata
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mkdir -p artifacts/pypi
          cat > artifacts/pypi/pyproject.toml << EOF
          [build-system]
          requires = ["maturin>=1.0,<2.0"]
          build-backend = "maturin"

          [project]
          name = "rjest"
          version = "$VERSION"
          description = "A fast Jest-compatible test runner written in Rust"
          readme = "README.md"
          requires-python = ">=3.7"
          classifiers = [
              "License :: OSI Approved :: MIT License",
              "Operating System :: OS Independent",
              "Programming Language :: Rust",
              "Programming Language :: Python :: 3",
          ]
          keywords = ["jest", "testing", "rust", "runner"]
          authors = [
              { name = "Dipankar Sarkar", email = "dipankarsarkar@outlook.com" }
          ]

          [project.optional-dependencies]
          full = ["rjest"]

          [project.scripts]
          jest = "rjest.cli:main"
          EOF
          cp README.md artifacts/pypi/
          cp LICENSE artifacts/pypi/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.check-version.outputs.version }}
          tag_name: v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/jest-linux-x86_64.tar.gz
            artifacts/jest-linux-aarch64.tar.gz
            artifacts/jest-macos-x86_64.tar.gz
            artifacts/jest-macos-arm64.tar.gz
            artifacts/jest-windows-x86_64.zip
            artifacts/jest.rb
            artifacts/pypi/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create and push Homebrew tap
  homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [check-version, release]
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: dipankarsarkar/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: binary-x86_64-unknown-linux-gnu
          path: artifacts
      - name: Download release assets aarch64
        uses: actions/download-artifact@v4
        with:
          name: binary-aarch64-unknown-linux-gnu
          path: artifacts/aarch64
      - name: Download release assets macos x86_64
        uses: actions/download-artifact@v4
        with:
          name: binary-x86_64-apple-darwin
          path: artifacts/macos-x86_64
      - name: Download release assets macos arm64
        uses: actions/download-artifact@v4
        with:
          name: binary-aarch64-apple-darwin
          path: artifacts/macos-arm64

      - name: Calculate checksums
        run: |
          cd artifacts
          echo "HOMEBREW_LINUX_X86_64_SHA=$(shasum -a 256 jest-linux-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          cd ..
          cd artifacts/aarch64
          echo "HOMEBREW_LINUX_ARM64_SHA=$(shasum -a 256 jest-linux-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          cd ../..
          cd artifacts/macos-x86_64
          echo "HOMEBREW_MACOS_X86_64_SHA=$(shasum -a 256 jest-macos-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          cd ../..
          cd artifacts/macos-arm64
          echo "HOMEBREW_MACOS_ARM64_SHA=$(shasum -a 256 jest-macos-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          cat > homebrew-tap/jest.rb << EOF
          class Jest < Formula
            desc "A fast Jest-compatible test runner written in Rust"
            homepage "https://github.com/dipankarsarkar/rjest"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/dipankarsarkar/rjest/releases/download/v${VERSION}/jest-macos-x86_64.tar.gz"
                sha256 "${HOMEBREW_MACOS_X86_64_SHA}"
              else
                url "https://github.com/dipankarsarkar/rjest/releases/download/v${VERSION}/jest-macos-arm64.tar.gz"
                sha256 "${HOMEBREW_MACOS_ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/dipankarsarkar/rjest/releases/download/v${VERSION}/jest-linux-x86_64.tar.gz"
                sha256 "${HOMEBREW_LINUX_X86_64_SHA}"
              else
                url "https://github.com/dipankarsarkar/rjest/releases/download/v${VERSION}/jest-linux-aarch64.tar.gz"
                sha256 "${HOMEBREW_LINUX_ARM64_SHA}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.intel?
                  bin.install "jest-macos-x86_64-apple-darwin" => "jest"
                else
                  bin.install "jest-macos-aarch64-apple-darwin" => "jest"
                end
              else
                if Hardware::CPU.intel? || Hardware::CPU.amd?
                  bin.install "jest-linux-x86_64-unknown-linux-gnu" => "jest"
                else
                  bin.install "jest-linux-aarch64-unknown-linux-gnu" => "jest"
                end
              end
            end

            test do
              system "#{bin}/jest --version"
            end
          end
          EOF

      - name: Commit and push
        working-directory: ./homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jest.rb
          git commit -m "Update jest to v${{ needs.check-version.outputs.version }}"
          git push

  # Publish to PyPI using maturin
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install maturin

      - name: Build and publish to PyPI
        run: |
          cd artifacts/pypi
          maturin publish --token ${{ secrets.PYPI_TOKEN }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
