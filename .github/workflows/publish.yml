name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+crt-static"

jobs:
  # Verify the tag matches the version in Cargo.toml
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: tag
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ github.ref_name }}
      - name: Extract version from Cargo.toml
        id: version
        run: |
          cargo_version=$(grep -m1 'version = "' Cargo.toml | sed 's/.*version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $cargo_version"
          echo "Tag version: ${{ steps.tag.outputs.version }}"
          if [ "$cargo_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Error: Tag version does not match Cargo.toml version"
            exit 1
          fi
          echo "version=$cargo_version" >> $GITHUB_OUTPUT

  # Publish to crates.io
  publish-cargo:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io
        uses: actions-rs/cargo@v1
        with:
          command: publish
          args: --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # Build and publish runtime to npm
  publish-npm-runtime:
    name: Publish rjest-runtime to npm
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ./crates/rjest-runtime
        run: npm ci
      - name: Publish to npm
        working-directory: ./crates/rjest-runtime
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build and publish rjest binary package to npm
  publish-npm-binary:
    name: Publish rjest binary package to npm
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries, release]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ./packages/rjest
        run: |
          npm install extract-zip tar
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: ./packages/rjest/prebuilds
          merge-multiple: true

      - name: Prepare prebuilds
        working-directory: ./packages/rjest/prebuilds
        run: |
          # Create archives from the downloaded binaries
          for dir in */; do
            target=$(basename "$dir")
            if [[ "$target" == *"windows"* ]]; then
              zip -j "rjest-${target}.zip" "$dir"/*
            else
              tar -czf "rjest-${target}.tar.gz" -C "$dir" .
            fi
          done
          rm -rf */
          shasum -a 256 *.tar.gz *.zip > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Update package version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          sed -i "s/\"version\": \"0.1.0\"/\"version\": \"${VERSION}\"/" packages/rjest/package.json
          cat packages/rjest/package.json | grep version

      - name: Publish to npm
        working-directory: ./packages/rjest
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build multi-platform binaries
  build-binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ''
            os: linux
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ''
            os: linux
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            ext: ''
            os: macos
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            ext: ''
            os: macos
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: '.exe'
            os: windows
            cross: false
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross
        run: cross build --release --all-features --target ${{ matrix.target }}

      - name: Prepare binaries for upload
        shell: bash
        run: |
          mkdir -p artifacts/rjest-${{ matrix.os }}-${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/jest${{ matrix.ext }}" "artifacts/rjest-${{ matrix.os }}-${{ matrix.target }}/"
          cp "target/${{ matrix.target }}/release/jestd${{ matrix.ext }}" "artifacts/rjest-${{ matrix.os }}-${{ matrix.target }}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: artifacts/rjest-${{ matrix.os }}-${{ matrix.target }}/
          retention-days: 7

  # Create GitHub release with installers
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -laR artifacts/

      - name: Create archive for Linux x86_64
        run: |
          cd artifacts/binary-x86_64-unknown-linux-gnu
          tar -czf ../rjest-linux-x86_64.tar.gz jest jestd
          shasum -a 256 ../rjest-linux-x86_64.tar.gz

      - name: Create archive for Linux aarch64
        run: |
          cd artifacts/binary-aarch64-unknown-linux-gnu
          tar -czf ../rjest-linux-aarch64.tar.gz jest jestd
          shasum -a 256 ../rjest-linux-aarch64.tar.gz

      - name: Create archive for macOS x86_64
        run: |
          cd artifacts/binary-x86_64-apple-darwin
          tar -czf ../rjest-macos-x86_64.tar.gz jest jestd
          shasum -a 256 ../rjest-macos-x86_64.tar.gz

      - name: Create archive for macOS arm64
        run: |
          cd artifacts/binary-aarch64-apple-darwin
          tar -czf ../rjest-macos-arm64.tar.gz jest jestd
          shasum -a 256 ../rjest-macos-arm64.tar.gz

      - name: Create zip for Windows
        run: |
          cd artifacts/binary-x86_64-pc-windows-msvc
          zip -r ../rjest-windows-x86_64.zip jest.exe jestd.exe
          shasum -a 256 ../rjest-windows-x86_64.zip

      - name: Create Homebrew formula
        run: |
          cat > artifacts/rjest.rb << 'EOF'
          class Rjest < Formula
            desc "A fast Jest-compatible test runner written in Rust"
            homepage "https://github.com/neul-labs/rjest"
            version ENV["VERSION"]
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/neul-labs/rjest/releases/download/v#{version}/rjest-macos-x86_64.tar.gz"
                sha256 ENV["HOMEBREW_MACOS_X86_64_SHA"]
              else
                url "https://github.com/neul-labs/rjest/releases/download/v#{version}/rjest-macos-arm64.tar.gz"
                sha256 ENV["HOMEBREW_MACOS_ARM64_SHA"]
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/neul-labs/rjest/releases/download/v#{version}/rjest-linux-x86_64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_X86_64_SHA"]
              else
                url "https://github.com/neul-labs/rjest/releases/download/v#{version}/rjest-linux-aarch64.tar.gz"
                sha256 ENV["HOMEBREW_LINUX_ARM64_SHA"]
              end
            end

            def install
              bin.install "jest"
              bin.install "jestd"
            end

            test do
              system "#{bin}/jest", "--version"
            end
          end
          EOF

      - name: Create PyPI package metadata
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          mkdir -p artifacts/pypi
          cat > artifacts/pypi/pyproject.toml << EOF
          [build-system]
          requires = ["maturin>=1.0,<2.0"]
          build-backend = "maturin"

          [project]
          name = "rjest"
          version = "$VERSION"
          description = "A fast Jest-compatible test runner written in Rust"
          readme = "README.md"
          requires-python = ">=3.7"
          classifiers = [
              "License :: OSI Approved :: MIT License",
              "Operating System :: OS Independent",
              "Programming Language :: Rust",
              "Programming Language :: Python :: 3",
          ]
          keywords = ["jest", "testing", "rust", "runner"]
          authors = [
              { name = "Dipankar Sarkar", email = "dipankarsarkar@outlook.com" }
          ]

          [project.optional-dependencies]
          full = ["rjest"]

          [project.scripts]
          jest = "rjest.cli:main"
          EOF
          cp README.md artifacts/pypi/
          cp LICENSE artifacts/pypi/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.check-version.outputs.version }}
          tag_name: v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/rjest-linux-x86_64.tar.gz
            artifacts/rjest-linux-aarch64.tar.gz
            artifacts/rjest-macos-x86_64.tar.gz
            artifacts/rjest-macos-arm64.tar.gz
            artifacts/rjest-windows-x86_64.zip
            artifacts/rjest.rb
            artifacts/pypi/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create and push Homebrew tap
  homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [check-version, release]
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: dipankarsarkar/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: false

      - name: Create archives and calculate checksums
        run: |
          # Create archives from downloaded binaries
          cd artifacts
          tar -czf rjest-linux-x86_64.tar.gz -C binary-x86_64-unknown-linux-gnu jest jestd
          echo "HOMEBREW_LINUX_X86_64_SHA=$(shasum -a 256 rjest-linux-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

          tar -czf rjest-linux-aarch64.tar.gz -C binary-aarch64-unknown-linux-gnu jest jestd
          echo "HOMEBREW_LINUX_ARM64_SHA=$(shasum -a 256 rjest-linux-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

          tar -czf rjest-macos-x86_64.tar.gz -C binary-x86_64-apple-darwin jest jestd
          echo "HOMEBREW_MACOS_X86_64_SHA=$(shasum -a 256 rjest-macos-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

          tar -czf rjest-macos-arm64.tar.gz -C binary-aarch64-apple-darwin jest jestd
          echo "HOMEBREW_MACOS_ARM64_SHA=$(shasum -a 256 rjest-macos-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          cat > homebrew-tap/rjest.rb << EOF
          class Rjest < Formula
            desc "A fast Jest-compatible test runner written in Rust"
            homepage "https://github.com/neul-labs/rjest"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/neul-labs/rjest/releases/download/v${VERSION}/rjest-macos-x86_64.tar.gz"
                sha256 "${HOMEBREW_MACOS_X86_64_SHA}"
              else
                url "https://github.com/neul-labs/rjest/releases/download/v${VERSION}/rjest-macos-arm64.tar.gz"
                sha256 "${HOMEBREW_MACOS_ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/neul-labs/rjest/releases/download/v${VERSION}/rjest-linux-x86_64.tar.gz"
                sha256 "${HOMEBREW_LINUX_X86_64_SHA}"
              else
                url "https://github.com/neul-labs/rjest/releases/download/v${VERSION}/rjest-linux-aarch64.tar.gz"
                sha256 "${HOMEBREW_LINUX_ARM64_SHA}"
              end
            end

            def install
              bin.install "jest"
              bin.install "jestd"
            end

            test do
              system "#{bin}/jest", "--version"
            end
          end
          EOF

      - name: Commit and push
        working-directory: ./homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rjest.rb
          git commit -m "Update rjest to v${{ needs.check-version.outputs.version }}"
          git push

  # Publish to PyPI using maturin
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install maturin

      - name: Build and publish to PyPI
        run: |
          cd artifacts/pypi
          maturin publish --token ${{ secrets.PYPI_TOKEN }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
